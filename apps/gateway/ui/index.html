<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenPotato</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>OpenPotato</h1>
      <button id="config-btn" title="Show config">⚙</button>
    </header>

    <main>
      <div id="chat" role="log" aria-label="Chat messages">
        <div class="message system">
          <div class="bubble">Connected. Type a message to start chatting.</div>
        </div>
      </div>
    </main>

    <footer>
      <form id="chat-form">
        <input type="text" id="message-input" placeholder="Type a message…" autofocus required>
        <button type="submit" id="send-btn">Send</button>
      </form>
    </footer>
  </div>

  <!-- Config modal -->
  <dialog id="config-modal">
    <header>
      <h2>Config</h2>
      <button id="close-config" aria-label="Close">&times;</button>
    </header>
    <pre id="config-content">Loading…</pre>
  </dialog>

  <script src="/app.js"></script>
</body>
</html>
