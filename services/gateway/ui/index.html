<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenPotato</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">

    <!-- ── Sidebar ────────────────────────────────────────────── -->
    <aside id="sidebar">
      <div class="brand">
        <span class="brand-emoji">🥔</span>
        <div class="brand-text">
          <h1 class="brand-name">OpenPotato</h1>
          <span class="brand-version">v0.1.0</span>
        </div>
      </div>

      <nav id="sidebar-nav">
        <a class="nav-item active" data-view="chat">
          <span class="nav-icon">💬</span>
          <span class="nav-label">Chat</span>
        </a>
        <a class="nav-item" data-view="settings">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label">Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="connection-status">
          <span class="status-dot"></span>
          <span class="status-label">Connected</span>
        </div>
        <span class="status-endpoint">localhost:8000</span>
      </div>
    </aside>

    <!-- ── Main ───────────────────────────────────────────────── -->
    <main id="main">

      <!-- ── Chat View ──────────────────────────────────────── -->
      <section id="view-chat" class="view active">
        <header class="view-header">
          <h2 class="view-title">Chat</h2>
        </header>

        <div id="chat" role="log" aria-label="Chat messages">
          <div class="message system">
            <div class="bubble">Connected. Type a message to start chatting.</div>
          </div>
        </div>

        <div class="input-area">
          <form id="chat-form">
            <div class="input-wrapper">
              <input
                type="text"
                id="message-input"
                placeholder="Ask anything…"
                autofocus
                required
              >
              <button type="submit" id="send-btn" aria-label="Send message">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"></line>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
              </button>
            </div>
          </form>
        </div>
      </section>

      <!-- ── Settings View ───────────────────────────────────── -->
      <section id="view-settings" class="view">
        <header class="view-header">
          <h2 class="view-title">Settings</h2>
        </header>

        <div class="settings-content">
          <div class="settings-card">
            <p class="settings-hint">
              Configuration is loaded from <code>config.json</code> on every request.
              Edit the file directly — changes apply immediately, no restart needed.
            </p>
          </div>
          <div class="settings-card config-card">
            <div class="config-card-header">
              <span class="config-card-icon">⚙️</span>
              <span>Current Configuration</span>
            </div>
            <pre id="config-content">Loading…</pre>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
