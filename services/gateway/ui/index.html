<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenPotato</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">

    <!-- ── Sidebar ────────────────────────────────────────────── -->
    <aside id="sidebar">
      <div class="brand">
        <span class="brand-emoji">🥔</span>
        <div class="brand-text">
          <h1 class="brand-name">OpenPotato</h1>
          <span class="brand-version">v0.1.0</span>
        </div>
      </div>

      <nav id="sidebar-nav">
        <a class="nav-item active" data-view="chat">
          <span class="nav-icon">💬</span>
          <span class="nav-label">Chat</span>
        </a>
        <a class="nav-item" data-view="settings">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label">Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="connection-status">
          <span class="status-dot"></span>
          <span class="status-label">Connected</span>
        </div>
      </div>
    </aside>

    <!-- ── Main ───────────────────────────────────────────────── -->
    <main id="main">
      <label class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <input type="checkbox" id="theme-checkbox" hidden>
        <span class="toggle-track">
          <span class="toggle-icon toggle-icon-dark">🌙</span>
          <span class="toggle-knob"></span>
          <span class="toggle-icon toggle-icon-light">☀️</span>
        </span>
      </label>

      <!-- ── Chat View ──────────────────────────────────────── -->
      <section id="view-chat" class="view active">
        <header class="view-header">
          <h2 class="view-title">Chat</h2>
        </header>

        <div id="chat" role="log" aria-label="Chat messages">
          <div class="message system">
            <div class="bubble">Connected. Type a message to start chatting.</div>
          </div>
        </div>

        <div class="input-area">
          <form id="chat-form">
            <div class="input-wrapper">
              <input
                type="text"
                id="message-input"
                placeholder="Ask anything…"
                autofocus
                required
              >
              <button type="submit" id="send-btn" aria-label="Send message">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"></line>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
              </button>
            </div>
          </form>
        </div>
      </section>

      <!-- ── Settings View ───────────────────────────────────── -->
      <section id="view-settings" class="view">
        <header class="view-header">
          <h2 class="view-title">Settings</h2>
        </header>

        <div class="settings-content">
          <form id="settings-form" class="settings-form">
            <div class="settings-card settings-table-card">
              <div class="settings-table">
                <div class="settings-table-row">
                  <span class="settings-table-col-key"><code>LLM_MODEL</code></span>
                  <span class="settings-table-col-val">
                    <input type="text" id="setting-model" class="form-input" placeholder="e.g. deepseek-v4-flash">
                  </span>
                </div>
                <div class="settings-table-row">
                  <span class="settings-table-col-key"><code>LLM_BASE_URL</code></span>
                  <span class="settings-table-col-val">
                    <input type="text" id="setting-base-url" class="form-input" placeholder="e.g. https://api.deepseek.com/anthropic">
                  </span>
                </div>
                <div class="settings-table-row">
                  <span class="settings-table-col-key"><code>LLM_API_KEY</code></span>
                  <span class="settings-table-col-val">
                    <input type="text" id="setting-api-key" class="form-input" placeholder="Enter your API key">
                  </span>
                </div>
              </div>
            </div>

            <div class="settings-actions">
              <span id="settings-status" class="settings-status"></span>
              <button type="button" id="settings-cancel-btn" class="btn btn-ghost">Cancel</button>
              <button type="button" id="settings-restore-btn" class="btn btn-secondary">Restore Defaults</button>
              <button type="submit" id="settings-save-btn" class="btn btn-primary">Save Settings</button>
            </div>
          </form>
        </div>
      </section>

    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
